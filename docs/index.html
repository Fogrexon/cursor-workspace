<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Playground</title>
  <style>
    /* lib/theme/theme.css のトークンと同期させること */
    :root {
      --color-bg: #12121a;
      --color-surface: #1c1c28;
      --color-surface-hover: #242432;
      --color-border: #32324a;
      --color-text: #e8e8f0;
      --color-text-muted: #9a9ab0;
      --color-accent: #6c7cff;
      --color-accent-hover: #8a97ff;
      --space-2: 8px;
      --space-3: 16px;
      --space-4: 24px;
      --space-6: 48px;
      --radius: 12px;
      --shadow: 0 2px 8px rgb(0 0 0 / 0.35);
      --transition: 150ms ease;
      --font-sans: "Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 960px;
      margin-inline: auto;
      padding: var(--space-6) var(--space-3);
    }

    header h1 {
      margin: 0 0 var(--space-2);
      font-size: 2rem;
    }

    header p {
      margin: 0 0 var(--space-6);
      color: var(--color-text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-3);
    }

    .card {
      display: block;
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition);
    }

    .card:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-accent);
    }

    .card h2 {
      margin: 0 0 var(--space-2);
      font-size: 1.15rem;
      color: var(--color-accent);
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    .empty {
      padding: var(--space-6);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Cursor Playground</h1>
      <p>Cursor で実装したアプリの実験場。各カードからアプリを開けます。</p>
    </header>

    <div class="grid">
      <a class="card" href="./box2d-car-game/">
        <h2>Box2D カーゲーム</h2>
        <p>Box2D 物理エンジンで動く車を操作し、丘を越えてどこまで進めるか挑戦するヒルクライムゲーム。</p>
      </a>
      <a class="card" href="./temperature-converter/">
        <h2>温度変換</h2>
        <p>摂氏・華氏・ケルビンを相互に変換します。</p>
      </a>
    </div>
  </main>
</body>
</html>
