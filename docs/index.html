<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Playground</title>
  <style>
    /* lib/theme/theme.css のトークンと同期させること */
    :root {
      --color-bg: #12121a;
      --color-surface: #1c1c28;
      --color-surface-hover: #242432;
      --color-border: #32324a;
      --color-text: #e8e8f0;
      --color-text-muted: #9a9ab0;
      --color-accent: #6c7cff;
      --color-accent-hover: #8a97ff;
      --space-2: 8px;
      --space-3: 16px;
      --space-4: 24px;
      --space-6: 48px;
      --radius: 12px;
      --shadow: 0 2px 8px rgb(0 0 0 / 0.35);
      --transition: 150ms ease;
      --font-sans: "Segoe UI", "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 960px;
      margin-inline: auto;
      padding: var(--space-6) var(--space-3);
    }

    header h1 {
      margin: 0 0 var(--space-2);
      font-size: 2rem;
    }

    header p {
      margin: 0 0 var(--space-3);
      color: var(--color-text-muted);
    }

    header .meta {
      margin: 0 0 var(--space-6);
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    header .meta a {
      color: var(--color-accent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-3);
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition);
    }

    .card:hover {
      background: var(--color-surface-hover);
      border-color: var(--color-accent);
    }

    .card h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .card h2 a {
      color: var(--color-accent);
      text-decoration: none;
    }

    .card h2 a:hover {
      color: var(--color-accent-hover);
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--color-text-muted);
      flex: 1;
    }

    .card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .card .tags li {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      padding: 2px 8px;
    }

    .card .links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-3);
      font-size: 0.85rem;
    }

    .card .links a {
      color: var(--color-accent);
    }

    .empty {
      padding: var(--space-6);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--color-text-muted);
    }

    .section-title {
      margin: var(--space-6) 0 var(--space-3);
      font-size: 1.1rem;
      color: var(--color-text-muted);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="workspace-title">Cursor Playground</h1>
      <p id="workspace-desc">読み込み中…</p>
      <p class="meta" id="workspace-meta" hidden></p>
    </header>

    <h2 class="section-title" id="apps-heading" hidden>Apps</h2>
    <div class="grid" id="apps-grid"></div>

    <h2 class="section-title" id="libs-heading" hidden>Libraries</h2>
    <div class="grid" id="libs-grid"></div>

    <p class="empty" id="status">カタログを読み込んでいます…</p>
  </main>
  <script>
    function relativeDemoHref(demoUrl, pagesBaseUrl) {
      if (!demoUrl) return null;
      if (pagesBaseUrl && demoUrl.startsWith(pagesBaseUrl)) {
        return "./" + demoUrl.slice(pagesBaseUrl.length);
      }
      try {
        const u = new URL(demoUrl);
        const parts = u.pathname.replace(/\/+$/, "").split("/");
        const id = parts[parts.length - 1];
        return id ? "./" + id + "/" : demoUrl;
      } catch {
        return demoUrl;
      }
    }

    function cardHtml(item, pagesBaseUrl) {
      const demoHref = relativeDemoHref(item.links.demo, pagesBaseUrl);
      const title = demoHref
        ? '<h2><a href="' +
          escapeAttr(demoHref) +
          '">' +
          escapeHtml(item.title) +
          "</a></h2>"
        : "<h2>" + escapeHtml(item.title) + "</h2>";
      const tags = (item.tags || [])
        .map((t) => "<li>" + escapeHtml(t) + "</li>")
        .join("");
      const links = [];
      if (demoHref) {
        links.push('<a href="' + escapeAttr(demoHref) + '">開く</a>');
      }
      if (item.links.source) {
        links.push(
          '<a href="' +
            escapeAttr(item.links.source) +
            '" rel="noopener noreferrer" target="_blank">ソース</a>',
        );
      }
      return (
        '<article class="card">' +
        title +
        "<p>" +
        escapeHtml(item.summary) +
        "</p>" +
        (tags ? '<ul class="tags">' + tags + "</ul>" : "") +
        (links.length ? '<div class="links">' + links.join("") + "</div>" : "") +
        "</article>"
      );
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    async function main() {
      const status = document.getElementById("status");
      try {
        const res = await fetch("./api/catalog.json", { cache: "no-cache" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const catalog = await res.json();

        document.getElementById("workspace-title").textContent =
          catalog.workspace.title;
        document.getElementById("workspace-desc").textContent =
          catalog.workspace.description || "";

        const meta = document.getElementById("workspace-meta");
        const bits = [];
        bits.push(
          '<a href="./api/catalog.json">catalog.json</a>（静的 API）',
        );
        if (catalog.workspace.source && catalog.workspace.source.url) {
          bits.push(
            '<a href="' +
              escapeAttr(catalog.workspace.source.url) +
              '" rel="noopener noreferrer" target="_blank">リポジトリ</a>',
          );
        }
        meta.innerHTML = bits.join(" · ");
        meta.hidden = false;

        const apps = catalog.items.filter(
          (i) => i.kind === "app" && i.portal,
        );
        const libs = catalog.items.filter((i) => i.kind === "lib");
        const base = catalog.workspace.pagesBaseUrl;

        const appsGrid = document.getElementById("apps-grid");
        const libsGrid = document.getElementById("libs-grid");
        appsGrid.innerHTML = apps.map((i) => cardHtml(i, base)).join("");
        libsGrid.innerHTML = libs.map((i) => cardHtml(i, base)).join("");

        document.getElementById("apps-heading").hidden = apps.length === 0;
        document.getElementById("libs-heading").hidden = libs.length === 0;
        status.hidden = true;
      } catch (err) {
        status.textContent =
          "カタログの読み込みに失敗しました: " +
          (err && err.message ? err.message : String(err));
      }
    }

    main();
  </script>
</body>
</html>
