<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* lib/theme/theme.css のトークンと同期させること */
    :root {
      --color-bg: #090c10;
      --color-surface: #121820;
      --color-surface-hover: #1a222d;
      --color-border: #2a3544;
      --color-text: #eef3f7;
      --color-text-muted: #8b9aab;
      --color-accent: #3ecf8e;
      --color-accent-hover: #63dba5;
      --color-accent-muted: rgb(62 207 142 / 0.14);
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 16px;
      --space-4: 24px;
      --space-5: 32px;
      --space-6: 48px;
      --content-max: 960px;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 1px 0 rgb(255 255 255 / 0.04), 0 10px 28px rgb(0 0 0 / 0.38);
      --transition: 160ms ease;
      --font-sans: "Manrope", "Noto Sans JP", system-ui, sans-serif;
      --text-2xl: clamp(1.75rem, 4vw, 2.25rem);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      background:
        radial-gradient(900px 480px at 12% -8%, rgb(62 207 142 / 0.1), transparent 55%),
        radial-gradient(720px 420px at 100% 0%, rgb(72 130 200 / 0.08), transparent 50%),
        var(--color-bg);
      background-attachment: fixed;
      color: var(--color-text);
      font-family: var(--font-sans);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    @media (max-width: 640px) {
      body { background-attachment: scroll; }
    }

    main {
      max-width: var(--content-max);
      margin-inline: auto;
      padding:
        max(var(--space-5), env(safe-area-inset-top))
        max(var(--space-3), env(safe-area-inset-right))
        max(var(--space-6), env(safe-area-inset-bottom))
        max(var(--space-3), env(safe-area-inset-left));
    }

    @media (min-width: 720px) {
      main {
        padding-block: var(--space-6);
        padding-inline: var(--space-4);
      }
    }

    .hero {
      margin-bottom: var(--space-5);
      animation: rise 420ms ease both;
    }

    .hero__brand {
      margin: 0 0 var(--space-3);
      font-size: var(--text-2xl);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
    }

    .hero__desc {
      margin: 0 0 var(--space-3);
      max-width: 36rem;
      color: var(--color-text-muted);
      font-size: 1rem;
    }

    .hero__meta {
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2) var(--space-3);
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    .hero__meta a {
      color: var(--color-accent);
      text-decoration: none;
      transition: color var(--transition);
    }

    .hero__meta a:hover {
      color: var(--color-accent-hover);
    }

    .section {
      margin-top: var(--space-5);
      animation: rise 480ms ease both;
    }

    .section:nth-of-type(2) { animation-delay: 40ms; }
    .section:nth-of-type(3) { animation-delay: 80ms; }
    .section:nth-of-type(4) { animation-delay: 120ms; }

    .section-title {
      margin: 0 0 var(--space-3);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
    }

    @media (min-width: 560px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 860px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      min-height: 100%;
      padding: var(--space-4);
      background: rgb(18 24 32 / 0.88);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition:
        background var(--transition),
        border-color var(--transition),
        transform var(--transition);
    }

    @media (hover: hover) and (pointer: fine) {
      .card:hover {
        background: var(--color-surface-hover);
        border-color: rgb(62 207 142 / 0.45);
        transform: translateY(-2px);
      }
    }

    .card:active {
      transform: translateY(0);
    }

    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .card h2 a {
      color: var(--color-text);
      text-decoration: none;
    }

    .card h2 a:hover {
      color: var(--color-accent-hover);
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--color-text-muted);
      flex: 1;
    }

    .card .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .card .tags li {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--color-text-muted);
      background: var(--color-accent-muted);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 4px 8px;
    }

    .card .links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-1);
    }

    .card .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 var(--space-3);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition:
        background var(--transition),
        border-color var(--transition),
        color var(--transition);
    }

    .card .links a:first-child {
      background: var(--color-accent);
      border-color: transparent;
      color: #04110a;
    }

    .card .links a:first-child:hover {
      background: var(--color-accent-hover);
      color: #04110a;
    }

    .card .links a:not(:first-child):hover {
      border-color: var(--color-accent);
      color: var(--color-accent-hover);
    }

    .empty {
      padding: var(--space-5) var(--space-3);
      border: 1px dashed var(--color-border);
      border-radius: var(--radius);
      text-align: center;
      color: var(--color-text-muted);
    }

    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero,
      .section {
        animation: none;
      }

      .card {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <h1 class="hero__brand" id="workspace-title">Cursor Playground</h1>
      <p class="hero__desc" id="workspace-desc">読み込み中…</p>
      <p class="hero__meta" id="workspace-meta" hidden></p>
    </header>

    <section class="section" id="apps-section" hidden>
      <h2 class="section-title" id="apps-heading">Apps</h2>
      <div class="grid" id="apps-grid"></div>
    </section>

    <section class="section" id="research-section" hidden>
      <h2 class="section-title" id="research-heading">Research</h2>
      <div class="grid" id="research-grid"></div>
    </section>

    <section class="section" id="libs-section" hidden>
      <h2 class="section-title" id="libs-heading">Libraries</h2>
      <div class="grid" id="libs-grid"></div>
    </section>

    <p class="empty" id="status">カタログを読み込んでいます…</p>
  </main>
  <script>
    function relativeDemoHref(demoUrl, pagesBaseUrl) {
      if (!demoUrl) return null;
      if (pagesBaseUrl && demoUrl.startsWith(pagesBaseUrl)) {
        return "./" + demoUrl.slice(pagesBaseUrl.length);
      }
      try {
        const u = new URL(demoUrl);
        const parts = u.pathname.replace(/\/+$/, "").split("/");
        const id = parts[parts.length - 1];
        return id ? "./" + id + "/" : demoUrl;
      } catch {
        return demoUrl;
      }
    }

    function cardHtml(item, pagesBaseUrl) {
      const demoHref = relativeDemoHref(item.links.demo, pagesBaseUrl);
      const title = demoHref
        ? '<h2><a href="' +
          escapeAttr(demoHref) +
          '">' +
          escapeHtml(item.title) +
          "</a></h2>"
        : "<h2>" + escapeHtml(item.title) + "</h2>";
      const tags = (item.tags || [])
        .map((t) => "<li>" + escapeHtml(t) + "</li>")
        .join("");
      const links = [];
      if (demoHref) {
        links.push('<a href="' + escapeAttr(demoHref) + '">開く</a>');
      }
      if (item.links.source) {
        links.push(
          '<a href="' +
            escapeAttr(item.links.source) +
            '" rel="noopener noreferrer" target="_blank">ソース</a>',
        );
      }
      return (
        '<article class="card">' +
        title +
        "<p>" +
        escapeHtml(item.summary) +
        "</p>" +
        (tags ? '<ul class="tags">' + tags + "</ul>" : "") +
        (links.length ? '<div class="links">' + links.join("") + "</div>" : "") +
        "</article>"
      );
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    async function main() {
      const status = document.getElementById("status");
      try {
        const res = await fetch("./api/catalog.json", { cache: "no-cache" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const catalog = await res.json();

        document.getElementById("workspace-title").textContent =
          catalog.workspace.title;
        document.getElementById("workspace-desc").textContent =
          catalog.workspace.description || "";

        const meta = document.getElementById("workspace-meta");
        const bits = [];
        bits.push(
          '<a href="./api/catalog.json">catalog.json</a>',
        );
        if (catalog.workspace.source && catalog.workspace.source.url) {
          bits.push(
            '<a href="' +
              escapeAttr(catalog.workspace.source.url) +
              '" rel="noopener noreferrer" target="_blank">リポジトリ</a>',
          );
        }
        meta.innerHTML = bits.join("");
        meta.hidden = false;

        const sectionOf = (i) => i.portalSection || "playground";
        const apps = catalog.items.filter(
          (i) => i.kind === "app" && i.portal && sectionOf(i) === "playground",
        );
        const research = catalog.items.filter(
          (i) => i.kind === "app" && i.portal && sectionOf(i) === "research",
        );
        const libs = catalog.items.filter((i) => i.kind === "lib");
        const base = catalog.workspace.pagesBaseUrl;

        const appsGrid = document.getElementById("apps-grid");
        const researchGrid = document.getElementById("research-grid");
        const libsGrid = document.getElementById("libs-grid");
        appsGrid.innerHTML = apps.map((i) => cardHtml(i, base)).join("");
        researchGrid.innerHTML = research.map((i) => cardHtml(i, base)).join("");
        libsGrid.innerHTML = libs.map((i) => cardHtml(i, base)).join("");

        document.getElementById("apps-section").hidden = apps.length === 0;
        document.getElementById("research-section").hidden =
          research.length === 0;
        document.getElementById("libs-section").hidden = libs.length === 0;
        status.hidden = true;
      } catch (err) {
        status.textContent =
          "カタログの読み込みに失敗しました: " +
          (err && err.message ? err.message : String(err));
      }
    }

    main();
  </script>
</body>
</html>
